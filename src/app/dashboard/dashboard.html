<div style="display: flex; justify-content: space-between; align-items: center;">
  <h2>Top Animes</h2>
  
  <input 
    type="text" 
    [(ngModel)]="searchTerm" 
    placeholder="Search for an anime..." 
    style="padding: 10px; border-radius: 6px; border: 1px solid #ccc; width: 250px; font-size: 1rem;"
  >
</div>

<div style="background: #eef2f5; padding: 20px; border-radius: 8px; margin-bottom: 30px; display: flex; gap: 10px; align-items: center;">
  <h3 style="margin: 0; margin-right: 15px;">Add to Vault:</h3>
  
  <input 
    type="text" 
    placeholder="Anime Title..." 
    [(ngModel)]="newTitle"
    style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
    
  <input 
    type="number" 
    placeholder="Episodes..." 
    [(ngModel)]="newEpisodes"
    style="padding: 8px; border-radius: 4px; border: 1px solid #ccc; width: 100px;">
    
  <button 
    (click)="createNewAnime()"
    style="padding: 8px 16px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
    + Save Anime
  </button>
</div>

<div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px;">
  
  @for (anime of filteredAnimes(); track anime.id) {
    
    <app-anime-card 
      [animeInfo]="anime" 
      (favoriteSelected)="handleFavorite($event)"
      (deleteSelected)="handleDelete($event)">
    </app-anime-card>
    

  } @empty {
    <p style="color: #666; font-style: italic;">No animes match your search!</p>
  }

</div>
